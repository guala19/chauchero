version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chauchero
      POSTGRES_PASSWORD: dev_password_change_in_prod
      POSTGRES_DB: chauchero_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chauchero"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
