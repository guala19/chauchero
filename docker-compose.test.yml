version: '3.8'

# Test environment — uses a separate DB (chauchero_test) on port 5433
# so it never interferes with the dev DB.
#
# Usage:
#   docker-compose -f docker-compose.test.yml up -d
#   cd backend && pytest tests/integration/ -v
#   docker-compose -f docker-compose.test.yml down

services:
  postgres_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chauchero
      POSTGRES_PASSWORD: dev_password_change_in_prod
      POSTGRES_DB: chauchero_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chauchero"]
      interval: 5s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data  # in-memory — fast, disposable
