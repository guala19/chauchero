name: Chauchero
options:
  bundleIdPrefix: com.chauchero
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  defaultConfig: Debug
  groupOrdering:
    - order: [App, Features, Core, Resources]

settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: com.chauchero.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: Chauchero/Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_PREVIEWS: "YES"

targets:
  Chauchero:
    type: application
    platform: iOS
    sources:
      - path: Chauchero
    resources:
      - path: Chauchero/Resources/Assets.xcassets
      - path: Chauchero/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chauchero.app
